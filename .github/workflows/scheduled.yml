name: GenDrop - Scheduled Nightly Notify

# Option A: no recording / no Drive. Picks a random .txt under sketches/ (or Gemini post.txt
# fallback) and posts to Google Chat when enabled.
#
# Cron is UTC. 20:00 JST = 11:00 UTC (Japan has no DST).
#
# Toggle Chat: Repository variable GENDROP_CHAT_NOTIFY = false to disable.
# Webhook: Secret GOOGLE_CHAT_WEBHOOK_URL (if unset, job succeeds without posting).

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      chat_notify:
        description: 'Send to Google Chat (overrides repo var for this run: true/false)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: gendrop-scheduled-nightly-notify
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: automation/package-lock.json

      - name: Install Node dependencies
        working-directory: automation
        run: npm ci

      - name: Nightly random TXT → Google Chat
        working-directory: automation
        env:
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          CHAT_NOTIFY="${{ vars.GENDROP_CHAT_NOTIFY }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.chat_notify }}" ]; then
            CHAT_NOTIFY="${{ github.event.inputs.chat_notify }}"
          fi
          export GENDROP_CHAT_NOTIFY="$CHAT_NOTIFY"
          node nightly-notify.js
